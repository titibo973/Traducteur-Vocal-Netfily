<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <title>Traducteur Pro - Master 1.7</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; flex-direction: column; font-family: 'Segoe UI', sans-serif; background: #2c3e50; border: 10px solid #34495e; box-sizing: border-box; }
        .settings-panel { padding: 8px; background: #34495e; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; color: white; font-size: 0.75rem; }
        .engine-bar { background: #34495e; color: white; padding: 5px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #2c3e50; }
        .zone { height: 38%; display: flex; padding: 10px; margin: 5px; border: 3px solid #34495e; border-radius: 15px; background: #ecf0f1; position: relative; }
        .top { transform: rotate(180deg); }
        .divider { height: 2%; background: #34495e; }
        .left-col { width: 30%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; border-right: 2px solid #34495e; padding: 10px; }
        .right-col { width: 70%; display: flex; flex-direction: column; padding: 10px; overflow-y: auto; }
        .text-line { font-size: 1.1rem; margin: 5px 0; padding: 8px; border-bottom: 1px solid #bdc3c7; color: #2c3e50; }
        select { width: 95%; padding: 6px; border-radius: 5px; background: #e67e22; color: white; cursor: pointer; border: none; }
        .user-icon { padding: 5px 15px; border-radius: 20px; background: #34495e; color: white; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-record { background-color: #e67e22; color: white; border-radius: 50px; padding: 12px 20px; border: none; font-weight: bold; width: 95%; cursor: pointer; transition: 0.3s; }
        .btn-record.active { background-color: #27ae60; }
        .btn-export { background: #34495e; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="engine-bar">
        <div>Moteur : <select id="moteurGeo"><option>États-Unis</option><option>Europe</option><option>Amérique du Sud</option><option>Amérique du Nord</option><option>Asie</option><option>Australie</option><option>Afrique</option></select></div>
        <div>Interface : <select id="langInterface"><option>Français</option><option>Anglais</option><option>Portugais</option><option>Espagnol</option><option>Allemand</option><option>Italien</option></select></div>
    </div>
    <div class="settings-panel">
        <div>Fond A: <input type="color" id="bgColA" value="#2c3e50"></div>
        <div>Fond B: <input type="color" id="bgColB" value="#ecf0f1"></div>
        <div>Cadre/Milieu: <input type="color" id="colCadre" value="#34495e"></div>
        <div>Btn Inactif: <input type="color" id="colBtnInact" value="#e67e22"></div>
        <div>Actif: <input type="color" id="colAct" value="#27ae60"></div>
    </div>
    <div class="zone top" id="zoneTop">
        <div class="left-col">
            <select id="langTop" onchange="updateBtnText('btnTop', this.value)">
                <option value="fr-FR">🇫🇷 Français</option><option value="pt-BR">🇧🇷 PT-BR</option><option value="pt-PT">🇵🇹 PT-PT</option>
                <option value="es-ES">🇪🇸 Espagnol</option><option value="de-DE">🇩🇪 Allemand</option><option value="it-IT">🇮🇹 Italien</option>
                <option value="ht-HT">🇭🇹 Créole Haïtien</option><option value="gcr-GF">🇬🇫 Créole Guyanais</option>
            </select>
            <div class="user-icon" id="userTop" onclick="setNom('userTop')">Pseudo A</div>
            <button id="btnTop" class="btn-record" onclick="lancerTraduction('top')">Appuyer pour parler</button>
        </div>
        <div class="right-col" id="logTop"></div>
    </div>
    <div class="divider" id="divider"></div>
    <div class="zone bottom" id="zoneBottom">
        <div class="left-col">
            <select id="langBottom" onchange="updateBtnText('btnBottom', this.value)">
                <option value="fr-FR">🇫🇷 Français</option><option value="pt-BR">🇧🇷 PT-BR</option><option value="pt-PT">🇵🇹 PT-PT</option>
                <option value="es-ES">🇪🇸 Espagnol</option><option value="de-DE">🇩🇪 Allemand</option><option value="it-IT">🇮🇹 Italien</option>
                <option value="ht-HT">🇭🇹 Créole Haïtien</option><option value="gcr-GF">🇬🇫 Créole Guyanais</option>
            </select>
            <div class="user-icon" id="userBottom" onclick="setNom('userBottom')">Pseudo B</div>
            <button id="btnBottom" class="btn-record" onclick="lancerTraduction('bottom')">Appuyer pour parler</button>
            <button class="btn-export" onclick="exporterPDF()">Exporter PDF</button>
        </div>
        <div class="right-col" id="logBottom"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
