<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Traducteur Vocal Pro</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #f4f7f6; }
        .engine-selector { padding: 10px; background: #2c3e50; color: white; text-align: center; }
        .zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; border-bottom: 2px solid #ddd; }
        .top { transform: rotate(180deg); background: #fff; }
        .bottom { background: #fff; }
        .text-display { font-size: 2.5rem; font-weight: bold; color: #2c3e50; text-align: center; padding: 0 20px; }
        .controls { padding: 15px; background: #ecf0f1; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; }
        .btn-mic { width: 80px; height: 80px; border-radius: 50%; border: none; background: #e74c3c; color: white; font-size: 2rem; cursor: pointer; transition: 0.3s; }
        select { padding: 8px; font-size: 1rem; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="engine-selector">
        Moteur : <select id="engineSelect"><option value="GLOBAL">Global</option><option value="CHINE">Chine</option></select>
    </div>
    <div class="zone top">
        <div id="text-top" class="text-display">...</div>
        <button class="btn-mic" onclick="lancerTraduction('top')">🎙️</button>
    </div>
    <div class="controls">
        <select id="langTop">
            <option value="ht-HT">🇭🇹 Créole Haïtien</option><option value="fr-FR">🇫🇷 Français</option>
            <option value="pt-PT">🇵🇹 Portugais</option><option value="pt-BR">🇧🇷 Port. Brésilien</option>
            <option value="es-ES">🇪🇸 Espagnol</option><option value="en-US">🇺🇸 Anglais</option>
        </select>
        <span> ↔ </span>
        <select id="langBottom">
            <option value="fr-FR">🇫🇷 Français</option><option value="ht-HT">🇭🇹 Créole Haïtien</option>
            <option value="pt-PT">🇵🇹 Portugais</option><option value="pt-BR">🇧🇷 Port. Brésilien</option>
            <option value="es-ES">🇪🇸 Espagnol</option><option value="en-US">🇺🇸 Anglais</option>
        </select>
        <label>Vitesse: <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1"></label>
    </div>
    <div class="zone bottom">
        <button class="btn-mic" onclick="lancerTraduction('bottom')">🎙️</button>
        <div id="text-bottom" class="text-display">...</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
